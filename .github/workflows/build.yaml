name: Teste CI

on: [push]

jobs:

  build:

    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.listar-juntas.outputs.teste }}
      output2: ${{ steps.listar-juntas.outputs.test }}

    steps:
    - id: listar-juntas
      run: |
        set -x
        commit_message=$(echo "${{ github.event.head_commit.message }}" | grep "\[ambientes\]")
        echo ${commit_message##*:}
        JSON_STRING=$(echo ${commit_message##*:} | tr ',' '\n' | jq -R . | jq -c -s .)
         
        echo "teste=$JSON_STRING" >> "$GITHUB_OUTPUT"
        echo "test=world" >> "$GITHUB_OUTPUT"
        echo "$GITHUB_OUTPUT"

  job2:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      # Use fromJSON to parse the job output into an array for the matrix
      matrix:
        item: ${{ fromJSON(needs.build.outputs.output1) }}
    steps:
      - name: Process item
        run: |
          echo "Processing item: ${{ matrix.item }}"
