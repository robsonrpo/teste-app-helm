name: Teste CI

on: [push]

jobs:

  build:

    runs-on: ubuntu-latest
    outputs:
      teste: ${{ steps.listar-juntas.outputs.teste }}

    steps:
    - id: listar-juntas
      run: |
        commit_message=$(echo "${{ github.event.head_commit.message }}" | grep "\[ambientes\]")
        echo ${commit_message##*:}

        JSON_STRING=$(echo ${commit_message##*:} | tr ',' '\n' | jq -R . | jq -s .)
        echo JSON_STRINGg=\'$JSON_STRING\'
        echo "teste=$JSON_STRINGg">> $GITHUB_OUTPUT

  build2:

    runs-on: ubuntu-latest
    needs: build
    steps:
    - env:
        OUTPUT1: ${{needs.build.outputs.teste}}
      run: |
        #LIST=${{ fromJSON(env.OUTPUT1) }}
        echo "$OUTPUT1"
        echo ${LIST}
        #echo "First item: ${LIST[0]}"


