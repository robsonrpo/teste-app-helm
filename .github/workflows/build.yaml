name: Teste CI

on: [push]

jobs:

  build:

    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.listar-juntas.outputs.teste }}

    steps:
    - id: listar-juntas
      run: |
        commit_message=$(echo "${{ github.event.head_commit.message }}" | grep "\[ambientes\]")
        echo ${commit_message##*:}

        JSON_STRING=$(echo ${commit_message##*:} | tr ',' '\n' | jq -R . | jq -s .)
        echo JSON_STRINGg=\'$JSON_STRING\'
        echo "teste=$JSON_STRINGg">> "$GITHUB_OUTPUT"

  build2:

    runs-on: ubuntu-latest
    needs: build
    steps:
    - env:
        OUTPUT1: ${{needs.build.outputs.output1}}
      run: |
        teste="$OUTPUT1"
        echo "teste=$teste"

  job1:
    runs-on: ubuntu-latest
    # Map a step output to a job output
    outputs:
      output1: ${{ steps.step1.outputs.test }}
      output2: ${{ steps.step2.outputs.test }}
    steps:
      - id: step1
        run: echo "test=hello" >> "$GITHUB_OUTPUT"
      - id: step2
        run: echo "test=world" >> "$GITHUB_OUTPUT"
  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - env:
          OUTPUT1: ${{needs.job1.outputs.output1}}
          OUTPUT2: ${{needs.job1.outputs.output2}}
        run: echo "$OUTPUT1 $OUTPUT2"

